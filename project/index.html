const { useState, useEffect, useRef, useCallback } = React;

// ── Parallax reveal hook ──
// Each section slides up from below + fades in as it enters the viewport.
// The parallax layer inside moves at a slower rate as you scroll past.
function useParallax(speed = 0.18) {
  const sectionRef = useRef(null);
  const innerRef   = useRef(null);

  useEffect(() => {
    const section = sectionRef.current;
    const inner   = innerRef.current;
    if (!section) return;

    let entered = false;
    let raf = null;

    // Initial hidden state
    section.style.opacity   = '0';
    section.style.transform = 'translateY(48px)';
    section.style.transition = 'opacity 0.85s cubic-bezier(0.22,1,0.36,1), transform 0.85s cubic-bezier(0.22,1,0.36,1)';

    const reveal = () => {
      if (entered) return;
      entered = true;
      section.style.opacity   = '1';
      section.style.transform = 'translateY(0)';
    };

    const onScroll = () => {
      if (!entered) {
        const rect = section.getBoundingClientRect();
        if (rect.top < window.innerHeight * 0.88) reveal();
      }
      // Parallax inner layer
      if (inner) {
        const rect   = section.getBoundingClientRect();
        const center = rect.top + rect.height / 2 - window.innerHeight / 2;
        inner.style.transform = `translateY(${center * speed}px)`;
      }
    };

    // Check immediately (in case already visible on load)
    onScroll();

    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, [speed]);

  return { sectionRef, innerRef };
}

          <div style={{ maxWidth: 860, margin: '0 auto' }}>
            {/* Header */}
            <div style={{ textAlign: 'center', marginBottom: 64 }}>
              <img src="uploads/isotipo_bizon.png" alt="Bizon" style={{ height: 64, marginBottom: 24 }} />
              <h2 style={{
            fontFamily: 'Barlow Condensed', fontWeight: 900, textTransform: 'uppercase',
            fontSize: 'clamp(44px,7vw,88px)', letterSpacing: '-0.02em', lineHeight: 0.9,
            marginBottom: 16
          }}>
                Hablemos<br /><span style={{ color: '#F26A00' }}>de tu proyecto</span>
              </h2>
              <p style={{ fontSize: 15, color: 'rgba(255,255,255,0.5)', maxWidth: 460, margin: '0 auto', lineHeight: 1.65 }}>
                Contanos qué necesitás y un especialista de Bizon te contactará para evaluar la solución más eficiente.
              </p>
            </div>

            {sent ?
        <div style={{ textAlign: 'center', padding: '60px 0' }}>
                <div style={{ fontSize: 48, marginBottom: 16 }}>✓</div>
                <h3 style={{ fontFamily: 'Barlow Condensed', fontSize: 32, fontWeight: 700, marginBottom: 8 }}>¡Mensaje enviado!</h3>
                <p style={{ color: 'rgba(255,255,255,0.5)' }}>Te contactaremos a la brevedad.</p>
              </div> :

        <form onSubmit={handleSubmit} style={{ display: 'grid', gap: 16 }}>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
                  {[
            { key: 'nombre', label: 'Nombre completo', placeholder: 'Juan García' },
            { key: 'empresa', label: 'Empresa', placeholder: 'Nombre de tu empresa' }].
            map(({ key, label, placeholder }) =>
            <div key={key}>
                      <label style={{ display: 'block', fontSize: 11, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.4)', marginBottom: 8 }}>{label}</label>
                      <input
                type="text" placeholder={placeholder} required
                value={form[key]}
                onChange={(e) => setForm((f) => ({ ...f, [key]: e.target.value }))}
                style={{
                  width: '100%', padding: '14px 16px', background: '#111',
                  border: '1px solid rgba(255,255,255,0.1)', borderRadius: 8,
                  color: '#fff', fontSize: 14, fontFamily: 'Barlow', outline: 'none',
                  transition: 'border-color 0.2s'
                }}
                onFocus={(e) => e.target.style.borderColor = 'rgba(242,106,0,0.5)'}
                onBlur={(e) => e.target.style.borderColor = 'rgba(255,255,255,0.1)'} />
              
                    </div>
            )}
                </div>
                <div>
                  <label style={{ display: 'block', fontSize: 11, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.4)', marginBottom: 8 }}>Email</label>
                  <input
              type="email" placeholder="tu@empresa.com" required
              value={form.email}
              onChange={(e) => setForm((f) => ({ ...f, email: e.target.value }))}
              style={{
                width: '100%', padding: '14px 16px', background: '#111',
                border: '1px solid rgba(255,255,255,0.1)', borderRadius: 8,
                color: '#fff', fontSize: 14, fontFamily: 'Barlow', outline: 'none',
                transition: 'border-color 0.2s'
              }}
              onFocus={(e) => e.target.style.borderColor = 'rgba(242,106,0,0.5)'}
              onBlur={(e) => e.target.style.borderColor = 'rgba(255,255,255,0.1)'} />
            
                </div>
                <div>
                  <label style={{ display: 'block', fontSize: 11, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.4)', marginBottom: 8 }}>¿Qué necesitás?</label>
                  <textarea
              placeholder="Describí brevemente el trabajo o equipo que necesitás intervenir..." required
              rows={4}
              value={form.mensaje}
              onChange={(e) => setForm((f) => ({ ...f, mensaje: e.target.value }))}
              style={{
                width: '100%', padding: '14px 16px', background: '#111',
                border: '1px solid rgba(255,255,255,0.1)', borderRadius: 8,
                color: '#fff', fontSize: 14, fontFamily: 'Barlow', outline: 'none',
                resize: 'vertical', transition: 'border-color 0.2s'
              }}
              onFocus={(e) => e.target.style.borderColor = 'rgba(242,106,0,0.5)'}
              onBlur={(e) => e.target.style.borderColor = 'rgba(255,255,255,0.1)'} />
            
                </div>
                <button type="submit" className="cta-btn" style={{ width: '100%', padding: '16px', fontSize: 15 }}>
                  Enviar consulta →
                </button>
              </form>
        }
          </div>
        </section>);

}

function Footer() {
  return (
    <footer style={{ padding: '40px 28px', background: '#050505', borderTop: '1px solid rgba(255,255,255,0.05)' }}>
          <div style={{ maxWidth: 1200, margin: '0 auto', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 20 }}>
            <img src="uploads/logo_principal_horizontal.png" alt="Bizon" style={{ height: 28 }} />
            <p style={{ fontSize: 12, color: 'rgba(255,255,255,0.25)', letterSpacing: '0.04em' }}>
              © 2025 Bizon Soluciones Industriales. Todos los derechos reservados.
            </p>
            <div style={{ display: 'flex', gap: 24 }}>
              {["Servicios", "Sectores", "Contacto"].map((l) =>
          <a key={l} href={`#${l.toLowerCase()}`}
          onClick={(e) => {e.preventDefault();document.querySelector(`#${l.toLowerCase()}`)?.scrollIntoView({ behavior: 'smooth' });}}
          style={{ fontSize: 12, color: 'rgba(255,255,255,0.35)', letterSpacing: '0.04em', transition: 'color 0.2s' }}
          onMouseEnter={(e) => e.target.style.color = '#F26A00'}
          onMouseLeave={(e) => e.target.style.color = 'rgba(255,255,255,0.35)'}>
            {l}</a>
          )}
            </div>
          </div>
        </footer>);

}

function App() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 60);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  return (
    <div>
          <Navbar scrolled={scrolled} />
          <Hero />
          <Services />
          <Gallery />
          <Sectors />
          <About />
          <Contact />
          <Footer />
        </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
