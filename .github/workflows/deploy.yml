name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@47.0.4

      - name: Build (vercel build)
        run: vercel build --prod
        env:
          VERCEL_ORG_ID: none
          VERCEL_PROJECT_ID: none

      - name: Transform for Cloudflare
        run: npx @cloudflare/next-on-pages@1 --skip-builds
        env:
          NODE_ENV: production

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=bizon-web --branch=main
